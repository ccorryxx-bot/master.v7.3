<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CODE MASTER V7.3 - PRO NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --bg-dark: #020617;
            --neon-blue: #6366f1;
            --neon-cyan: #06b6d4;
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #f8fafc; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-header {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 50;
        }

        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 120px;
            scroll-behavior: smooth;
        }

        .code-row { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.6);
        }

        .active-glow {
            border-color: var(--neon-cyan) !important;
            background: rgba(6, 182, 212, 0.05) !important;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
            transform: scale(1.01);
        }

        .done-dim { 
            opacity: 0.25; 
            filter: grayscale(1);
            border-color: transparent !important;
        }

        .btn-main {
            background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
            transition: all 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.96);
            filter: brightness(1.2);
        }

        @keyframes border-beam {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .last-copied-card {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)) padding-box,
                        linear-gradient(90deg, #6366f1, #06b6d4) border-box;
            border: 2px solid transparent;
        }
    </style>
</head>
<body class="p-4">

    <!-- Header Section -->
    <div class="glass-header fixed top-0 left-0 w-full px-4 pt-4 pb-2">
        <div class="max-w-md mx-auto">
            <header class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-extrabold italic bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-cyan-400 tracking-tighter">CODE MASTER V7.3</h1>
                    <p class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase opacity-70">Extreme Persistence System</p>
                </div>
                <button onclick="confirmReset()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-900/50 text-slate-400 hover:text-red-400 border border-slate-800 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            </header>

            <!-- Last Copied Display (Bigger & Clearer) -->
            <div class="last-copied-card rounded-2xl p-4 mb-4 shadow-2xl">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-[10px] font-extrabold text-cyan-400 tracking-[0.15em] uppercase">Last Copied Item</span>
                    <span id="lastCopiedIndex" class="text-xs font-black text-slate-500 bg-slate-800/50 px-2 py-0.5 rounded-md">#0</span>
                </div>
                <div id="lastCopiedText" class="font-mono text-xl font-black text-white truncate drop-shadow-sm">NONE</div>
            </div>

            <!-- Stats Bar -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-900/40 border border-slate-800 p-3 rounded-2xl flex items-center justify-between">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Total</span>
                    <span id="totalNum" class="text-lg font-black text-indigo-400">0</span>
                </div>
                <div class="bg-slate-900/40 border border-slate-800 p-3 rounded-2xl flex items-center justify-between">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Done</span>
                    <span id="doneNum" class="text-lg font-black text-green-400">0</span>
                </div>
            </div>

            <!-- Action Area -->
            <div class="flex gap-2 mb-3">
                <textarea id="inputCodes" class="flex-grow h-12 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-indigo-300 focus:border-indigo-500 outline-none resize-none transition-all" placeholder="Paste codes here..."></textarea>
                <div class="flex flex-col gap-1">
                    <button onclick="loadData()" class="px-4 h-6 bg-slate-800 rounded-lg font-bold text-[8px] uppercase tracking-wider text-white border border-slate-700 active:bg-slate-700">Load</button>
                    <button onclick="cleanDuplicates()" class="px-4 h-6 bg-slate-800 rounded-lg font-bold text-[8px] uppercase tracking-wider text-cyan-400 border border-slate-700 active:bg-slate-700">Dups</button>
                </div>
            </div>

            <button id="mainCopyBtn" onclick="copyNext()" class="btn-main w-full h-14 rounded-2xl font-black text-sm tracking-[0.2em] shadow-xl shadow-indigo-500/10 flex items-center justify-center gap-3">
                <span>COPY NEXT</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <!-- Scroll Area -->
    <div id="list" class="scroll-area w-full max-w-md mx-auto pt-[330px] no-scrollbar">
        <!-- Codes will render here -->
        <div class="text-center py-20 opacity-10 italic text-sm">Waiting for input...</div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-3 rounded-full text-[11px] font-black shadow-2xl scale-0 transition-all duration-300 z-[100] flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-cyan-500 animate-ping"></div>
        <span id="toastMsg">COPIED</span>
    </div>

    <script>
        let state = {
            codes: [],
            current: -1,
            lastCopied: "NONE",
            lastIndex: 0
        };

        // Initialize and Persistent Load
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('cm_v73_persistent');
            if (saved) {
                state = JSON.parse(saved);
                updateUI();
                // Scroll to active item on load
                scrollToActive();
            }
        });

        function save() {
            localStorage.setItem('cm_v73_persistent', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('totalNum').innerText = state.codes.length;
            document.getElementById('doneNum').innerText = state.current + 1;
            document.getElementById('lastCopiedText').innerText = state.lastCopied;
            document.getElementById('lastCopiedIndex').innerText = state.lastIndex > 0 ? `#${state.lastIndex}` : "#0";

            const container = document.getElementById('list');
            if (state.codes.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-10 italic text-sm">System Empty</div>';
                return;
            }

            container.innerHTML = "";
            state.codes.forEach((code, i) => {
                const isDone = i <= state.current;
                const isActive = i === state.current + 1;
                
                const div = document.createElement('div');
                div.id = `code-${i}`;
                div.className = `code-row flex items-center justify-between p-4 mb-3 border border-slate-800 rounded-2xl ${isDone ? 'done-dim' : ''} ${isActive ? 'active-glow' : ''}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <span class="text-[10px] font-black ${isActive ? 'text-cyan-400' : 'text-slate-600'}">#${i+1}</span>
                        <span class="font-mono font-bold tracking-[0.1em] truncate ${isActive ? 'text-white text-lg' : 'text-slate-400'}">${code}</span>
                    </div>
                    ${isActive ? '<div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#06b6d4]"></div>' : ''}
                    ${isDone ? '<svg class="text-green-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
                `;
                container.appendChild(div);
            });
        }

        function loadData() {
            const raw = document.getElementById('inputCodes').value.trim();
            if (!raw) {
                showToast("Empty Input", "red");
                return;
            }

            const newCodes = raw.split('\n').map(s => s.trim()).filter(s => s !== "");
            state = {
                codes: newCodes,
                current: -1,
                lastCopied: "READY",
                lastIndex: 0
            };
            
            save();
            updateUI();
            document.getElementById('inputCodes').value = "";
            showToast(`${newCodes.length} Codes Synced`, "indigo");
            container.scrollTop = 0;
        }

        function cleanDuplicates() {
            const oldLen = state.codes.length;
            state.codes = [...new Set(state.codes)];
            if (oldLen !== state.codes.length) {
                state.current = -1;
                save();
                updateUI();
                showToast(`Cleaned ${oldLen - state.codes.length} Dups`, "cyan");
            } else {
                showToast("No Duplicates", "slate");
            }
        }

        async function copyNext() {
            if (state.codes.length === 0) return;
            if (state.current >= state.codes.length - 1) {
                showToast("End of List", "indigo");
                return;
            }

            state.current++;
            const target = state.codes[state.current];
            state.lastCopied = target;
            state.lastIndex = state.current + 1;

            const success = await copyToClipboard(target);
            if (success) {
                save();
                updateUI();
                showToast(`Copied #${state.lastIndex}`, "cyan");
                scrollToActive();
            }
        }

        function scrollToActive() {
            setTimeout(() => {
                const targetId = state.current < state.codes.length - 1 ? `code-${state.current + 1}` : `code-${state.current}`;
                const el = document.getElementById(targetId);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        async function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                document.body.removeChild(textArea);
                return true;
            } catch (err) {
                document.body.removeChild(textArea);
                return false;
            }
        }

        function confirmReset() {
            if (confirm("Reset System? အချက်အလက်အားလုံး ပျက်သွားပါမည်။")) {
                state = { codes: [], current: -1, lastCopied: "NONE", lastIndex: 0 };
                localStorage.removeItem('cm_v73_persistent');
                updateUI();
                showToast("Database Cleared", "slate");
            }
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg.toUpperCase();
            t.classList.remove('scale-0', 'translate-y-10');
            t.classList.add('scale-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('scale-0', 'translate-y-10');
                t.classList.remove('scale-100', 'translate-y-0');
            }, 1200);
        }
    </script>
</body>
</html>
